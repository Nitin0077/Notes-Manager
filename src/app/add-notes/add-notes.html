@if(NoteInfo.showAddNote){

<div class="modal-overlay">

    <div class="container">

        <div class="content">

            <div class="modal-header">
                <h1>{{ NoteInfo.model }}</h1>

                <button
                    class="close-btn"
                    (click)="resetForm()">
                    ✖
                </button>
            </div>

            <form
              (ngSubmit)="NoteInfo.NoteId ? updateNote() : addNote()">

                <div class="form-group">
                    <label for="title">Title</label>

                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="form-control"
                        placeholder="Enter note title"
                        [(ngModel)]="note.title">
                </div>

                <div class="form-group">
                    <label for="content">Content</label>

                    <textarea
                        id="content"
                        name="content"
                        class="form-control"
                        rows="5"
                        placeholder="Enter note content"
                        [(ngModel)]="note.content">
                    </textarea>
                </div>

                <button type="submit" class="btn">
                    {{ NoteInfo.NoteId ? 'Update Note' : 'Save Note' }}
                </button>

            </form>

        </div>

    </div>

</div>

}
